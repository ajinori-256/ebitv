name: build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  go-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps for Ebiten
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev \
            libasound2-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

  raspberry-pi-build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps for Ebiten
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev \
            libasound2-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build (linux-arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build -o dist/career_app-linux-arm64 ./cmd/career_app

      - name: Upload artifact (linux-arm64)
        uses: actions/upload-artifact@v4
        with:
          name: career_app-linux-arm64
          path: dist/career_app-linux-arm64

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [go-build, raspberry-pi-build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact (linux-arm64)
        uses: actions/download-artifact@v4
        with:
          name: career_app-linux-arm64
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/career_app-linux-arm64
          generate_release_notes: true
